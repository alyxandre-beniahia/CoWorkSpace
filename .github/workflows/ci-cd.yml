# Name
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}

jobs:
  # Job 1: Tests et validation du code
  test:
    name: Build backend & frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./backend
        run: npm run prisma:generate

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  # Job 2: Build et push des images Docker
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=backend-main,enable={{is_default_branch}}
            type=sha,prefix=backend-,format=short
            type=raw,value=backend-latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:backend-buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:backend-buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=frontend-main,enable={{is_default_branch}}
            type=sha,prefix=frontend-,format=short
            type=raw,value=frontend-latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:frontend-buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:frontend-buildcache,mode=max
          platforms: linux/amd64,linux/arm64

  # Job 3: Notification Google Chat (carte)
  notify:
    name: Notify Google Chat
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    env:
      GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
      OVERALL_STATUS: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && 'Échec' || 'Succès' }}
      REPO_URL: ${{ github.event.repository.html_url }}
      BRANCH_NAME: ${{ github.ref_name }}
      ACTOR: ${{ github.actor }}
      EVENT_NAME: ${{ github.event_name }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
      TEST_RESULT: ${{ needs.test.result }}
      BUILD_RESULT: ${{ needs.build.result }}

    steps:
      - name: Prepare PR data (évite troncature via env)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request || {};
            fs.writeFileSync('/tmp/pr_title.txt', pr.title || '', 'utf8');
            fs.writeFileSync('/tmp/pr_body.txt', pr.body || '', 'utf8');

      - name: Send card to Google Chat
        run: |
          STATUS_ICON="✅"
          if [ "$OVERALL_STATUS" = "Échec" ]; then
            STATUS_ICON="❌"
          fi

          TIMESTAMP="$(TZ=Europe/Paris date '+%Y-%m-%d %H:%M:%S %Z')"

          # Construire la description (push vs PR) — contenu complet, sans troncature
          # PR : lu depuis fichiers (évite troncature des env vars) | Commit : depuis env
          # Nettoyage : retours à la ligne → espace, espaces multiples → un seul
          DESCRIPTION=""
          if [ "$EVENT_NAME" = "pull_request" ] && [ -f /tmp/pr_title.txt ]; then
            PR_TITLE_CLEAN=$(cat /tmp/pr_title.txt | tr '\n\r' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')
            PR_BODY_CLEAN=""
            [ -f /tmp/pr_body.txt ] && PR_BODY_CLEAN=$(cat /tmp/pr_body.txt | tr '\n\r' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')
            DESCRIPTION="PR: ${PR_TITLE_CLEAN}"
            [ -n "$PR_BODY_CLEAN" ] && DESCRIPTION="${DESCRIPTION} ${PR_BODY_CLEAN}"
          else
            COMMIT_CLEAN=$(printf '%s' "$COMMIT_MESSAGE" | tr '\n\r' ' ' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')
            DESCRIPTION="Commit: ${COMMIT_CLEAN}"
          fi

          # Construire le détail des erreurs par job
          ERROR_DETAILS=""
          if [ "$TEST_RESULT" != "success" ]; then
            ERROR_DETAILS="${ERROR_DETAILS}Job 1 (build backend/frontend) : échec du build ou des tests. "
          fi
          if [ "$BUILD_RESULT" != "success" ]; then
            ERROR_DETAILS="${ERROR_DETAILS}Job 2 (build Docker) : échec du build/push des images Docker. "
          fi
          if [ -z "$ERROR_DETAILS" ]; then
            ERROR_DETAILS="Aucune erreur détectée."
          fi

          # Éviter les doublons : ne pas notifier le push de merge de PR
          if [ "$EVENT_NAME" = "push" ] && echo "$COMMIT_MESSAGE" | grep -q "Merge pull request"; then
            echo "Notification ignorée pour le commit de merge de PR (déjà notifiée sur l'événement pull_request)."
            exit 0
          fi

          # Construire le JSON avec jq pour échapper correctement tous les champs (guillemets, retours à la ligne, etc.)
          jq -n \
            --arg status_icon "$STATUS_ICON" \
            --arg overall_status "$OVERALL_STATUS" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH_NAME" \
            --arg repo_url "$REPO_URL" \
            --arg timestamp "$TIMESTAMP" \
            --arg description "$DESCRIPTION" \
            --arg error_details "$ERROR_DETAILS" \
            '{
              cards: [
                {
                  header: {
                    title: "CI/CD CoWorkSpace",
                    subtitle: ($status_icon + " Statut: " + $overall_status)
                  },
                  sections: [
                    {
                      header: "Détails de l'\''exécution",
                      widgets: [
                        { keyValue: { topLabel: "Déclenché par", content: $actor } },
                        { keyValue: { topLabel: "Branche", content: $branch } },
                        { textParagraph: { text: ("<b>Dépôt</b><br><a href=\"" + $repo_url + "\" target=\"_blank\">Ouvrir le dépôt</a>") } },
                        { keyValue: { topLabel: "Statut global", content: $overall_status } },
                        { keyValue: { topLabel: "Date / heure", content: $timestamp } }
                      ]
                    },
                    {
                      header: "Description",
                      widgets: [
                        { textParagraph: { text: $description } },
                        { textParagraph: { text: ("<b>Erreurs</b><br>" + $error_details) } }
                      ]
                    }
                  ]
                }
              ]
            }' > /tmp/card.json

          curl -X POST -H "Content-Type: application/json; charset=UTF-8" \
            -d @/tmp/card.json \
            "$GOOGLE_CHAT_WEBHOOK"

